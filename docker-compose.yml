services:
  backend:
    build: ./backend
    container_name: review-poller-backend
    ports:
      - "3001:3001"
    volumes:
      # Persist reviews across `docker compose down`.
      - backend-data:/app/data
      # Mount config.json so reviewers can edit apps without rebuilding the image.
      - ./backend/config.json:/app/config.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: review-poller-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
